name = "ps-concierge"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Public, non-secret config. Edit these for your deployment.
[vars]
# Anthropic model id. Match the prototype, or change as you like.
MODEL = "claude-haiku-4-5"

# Public URL of the knowledge base markdown (served from your site).
# The Worker fetches + caches this (5 min) and injects it into the prompt,
# so the team edits ONE markdown file to update the bot.
KB_URL = "https://powershifter.com/docs/concierge-knowledge.md"

# Lock the endpoint to your site origin (CORS + a basic abuse guard).
# Use "*" only for local testing.
ALLOWED_ORIGIN = "https://powershifter.com"

# Optional soft abuse gate. If set, the page must send the SAME value as the
# X-PS-Token header — set CONFIG.clientToken in ps-concierge.js to match.
# It's client-visible, so it only deters scripted / no-Origin abuse; pair it
# with a Cloudflare Rate Limiting rule (and/or Turnstile) for real protection.
# Generate one with:  openssl rand -hex 16
# CLIENT_TOKEN = "paste-a-random-hex-string"

# Contact form (POST /contact → email via Resend). Set these to turn the
# concierge "Email us" form into a real form that emails the studio.
#   CONTACT_TO   = "bd@powershifter.com"
#   CONTACT_FROM = "POWER SHIFTER <concierge@powershifter.com>"   # must be a Resend-verified sender
# CONTACT_TO = "bd@powershifter.com"
# CONTACT_FROM = "POWER SHIFTER <concierge@powershifter.com>"

# SECRETS — do NOT put keys here. Set them once with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put RESEND_API_KEY        # only needed for the /contact route
