name = "ps-concierge"
main = "src/index.js"
# Match the date set in the Cloudflare dashboard so a deploy doesn't downgrade it.
compatibility_date = "2026-06-25"
# Keep remote settings as-is (dashboard had these) so `deploy` ships code only.
preview_urls = false

# Public, non-secret runtime config. Once the Worker auto-deploys from GitHub,
# THIS FILE is the source of truth for plaintext vars — Cloudflare applies
# exactly these [vars] on every deploy, so dashboard edits to plaintext vars get
# overwritten on the next push. Change vars HERE from now on. API keys are
# SECRETS (set in the dashboard) and are never touched by a deploy.
[vars]

# Anthropic model id.
MODEL = "claude-haiku-4-5"

# Public URL of the knowledge base markdown (served from the live site). The
# Worker fetches + caches it (5 min) and injects it into the prompt — edit that
# one file to update the bot. Flipped to the production domain at the
# 2026-07-13 cutover.
KB_URL = "https://powershifter.com/docs/concierge-knowledge.md"

# Lock requests to the site origin (CORS + abuse guard). Comma-separated
# allow-list. powershifter.com is the production domain (2026-07-13 cutover);
# ps-dot-com.vercel.app was dropped once it became a 308 redirect to the apex
# (no pages serve from that origin anymore). Use "*" only for local testing.
ALLOWED_ORIGIN = "https://powershifter.com,https://www.powershifter.com"

# Soft abuse gate: the page sends this as the X-PS-Token header (chat/contact)
# and in the /log body, and it must match. Client-visible by design (it ships in
# ps-concierge.js), so it's a speed-bump, not a secret — pair with Cloudflare
# rate-limiting / Turnstile for real protection. Keep CONFIG.clientToken in
# ps-concierge.js in sync with this value.
CLIENT_TOKEN = "7d771b12790faeefb8eaac7af37e5892"

# Contact form (POST /contact) + transcript emails (POST /log), both via Resend.
# CONTACT_FROM must be a Resend-verified sender — mailupdates.powershifter.com is
# verified; the bare powershifter.com is not. CONTACT_TO is the destination inbox.
CONTACT_TO = "bd@powershifter.com"
CONTACT_FROM = "POWER SHIFTER <concierge@mailupdates.powershifter.com>"

# "The Signal" footer signup -> Campaign Monitor (POST /subscribe).
# CM_LIST_ID is the target list's ID (not a secret - it's just an identifier).
#   Find it: Campaign Monitor > Lists & subscribers > <list> > Change name/type,
#   the List ID is shown there. Or GET /api/v3.3/clients/{clientid}/lists.json
# The API key is a SECRET and must NOT live in this file:
#   cd worker && npx wrangler secret put CM_API_KEY
# ConsentToTrack is required by CM on add ("Yes" | "No"). Kept here so it can be
# flipped without a code change - "Yes" claims the subscriber consented to open/
# click tracking, which should match what the form + privacy policy disclose.
CM_LIST_ID = "fc63da7ed1dbe8569b61ffae1c874c19"
CM_CONSENT_TO_TRACK = "Yes"

# SECRETS — never in this file. Set once in the dashboard (Variables and secrets
# → Secret), or via:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put RESEND_API_KEY

# Observability — logging/metrics were enabled in the dashboard; declare them
# here so a deploy preserves them instead of silently turning them off.
[observability]
enabled = true

[observability.logs]
enabled = true

# Per-IP rate limiting (Workers ratelimit binding, GA 2025-09). This is the
# "pair with Cloudflare rate-limiting" the CLIENT_TOKEN comment anticipates:
# the token ships in client code, so a scraper can replay it — these bindings
# cap how fast any single IP can burn Anthropic tokens (chat) or flood the
# BD inbox via Resend (/contact + /log). Limits are enforced per Cloudflare
# location (not global) and the Worker FAILS OPEN if a binding is missing,
# so deploying this config before/after the code is safe in either order.
# period must be 10 or 60 (seconds).
[[ratelimits]]
name = "CHAT_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }   # 10 chat messages / min / IP

[[ratelimits]]
name = "FORM_LIMITER"
namespace_id = "1002"
simple = { limit = 3, period = 60 }    # 3 contact/log submissions / min / IP
